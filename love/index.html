<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>给小雯宝宝 ♡</title>
<style>
  :root{
    --pink:#ffb6c9;
    --pink2:#ff8fab;
    --deep:#e5537f;
    --cream:#fff7f9;
    --text:#7a4a5a;
    --shadow:0 8px 24px rgba(229,83,127,.18);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:"Yuanti SC","YouYuan","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,#ffe3ec 0%,#fff0f5 40%,#e8f4ff 100%);
    color:var(--text);
    overflow-x:hidden;
    min-height:100vh;
  }
  .heart-bg{position:fixed;inset:0;pointer-events:none;z-index:0}
  .heart-bg span{position:absolute;top:-6vh;animation:fall linear infinite;opacity:.7}
  @keyframes fall{to{transform:translateY(110vh) rotate(360deg)}}

  /* envelope overlay */
  #cover{
    position:fixed;inset:0;z-index:100;
    background:linear-gradient(160deg,#ffd6e3,#ffeef4);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;
    transition:opacity .8s,visibility .8s;
  }
  #cover.open{opacity:0;visibility:hidden}
  #cover .env{
    font-size:6rem;cursor:pointer;
    animation:wobble 1.6s ease-in-out infinite;
    filter:drop-shadow(0 10px 18px rgba(229,83,127,.3));
    user-select:none;
  }
  @keyframes wobble{0%,100%{transform:rotate(-4deg) scale(1)}50%{transform:rotate(4deg) scale(1.08)}}
  #cover p{font-size:1.15rem;color:var(--deep);letter-spacing:.15em}
  #cover .tip{font-size:.85rem;color:#c98ba0}

  .wrap{position:relative;z-index:1;max-width:640px;margin:0 auto;padding:0 20px 60px}

  /* hero */
  .hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
  .hero img.main{width:min(240px,55vw);animation:bounce 2.4s ease-in-out infinite;filter:drop-shadow(0 12px 20px rgba(229,83,127,.25))}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
  .hero h1{
    font-size:clamp(2.2rem,9vw,3.4rem);margin-top:18px;color:var(--deep);
    text-shadow:3px 3px 0 #ffd6e3;
  }
  .hero h1 .dot{color:var(--pink2)}
  .hero .sub{margin-top:12px;font-size:1.05rem;color:#b06a82}
  .hero .arrow{margin-top:46px;font-size:1.5rem;color:var(--pink2);animation:bounce 1.6s infinite}

  .card{
    background:#fff;border-radius:24px;box-shadow:var(--shadow);
    padding:30px 26px;margin:26px 0;position:relative;
    border:3px dashed #ffd6e3;
  }
  .card h2{color:var(--deep);font-size:1.35rem;margin-bottom:16px;display:flex;align-items:center;gap:10px}
  .card h2 img{width:44px;height:44px;object-fit:contain}
  .card p{line-height:2;font-size:1rem}
  .stamp{position:absolute;width:76px;top:-26px;right:-6px;transform:rotate(12deg);filter:drop-shadow(0 6px 10px rgba(0,0,0,.12))}

  /* counter */
  .counter{display:flex;justify-content:center;gap:14px;margin-top:8px;flex-wrap:wrap}
  .counter .b{
    background:#fff0f5;border-radius:16px;padding:14px 18px;min-width:74px;text-align:center;
  }
  .counter .n{font-size:1.9rem;color:var(--deep);font-weight:700}
  .counter .l{font-size:.78rem;color:#b06a82;margin-top:2px}

  /* reasons */
  .reason-box{text-align:center}
  #reason{
    min-height:64px;display:flex;align-items:center;justify-content:center;
    font-size:1.08rem;color:var(--deep);padding:10px;line-height:1.9;
  }
  .btn{
    display:inline-block;border:none;cursor:pointer;
    background:linear-gradient(135deg,var(--pink2),var(--deep));color:#fff;
    font-size:1.02rem;padding:13px 34px;border-radius:999px;
    box-shadow:0 6px 16px rgba(229,83,127,.35);
    transition:transform .15s;font-family:inherit;
  }
  .btn:active{transform:scale(.93)}

  /* gallery strip */
  .strip{display:flex;justify-content:space-around;align-items:flex-end;margin:34px 0 8px;flex-wrap:wrap;gap:8px}
  .strip img{width:86px;height:86px;object-fit:contain;transition:transform .25s;cursor:pointer}
  .strip img:hover{transform:scale(1.25) rotate(-6deg)}

  /* question */
  .q-box{text-align:center;padding-bottom:10px}
  .q-btns{display:flex;justify-content:center;gap:22px;margin-top:22px;position:relative;min-height:56px}
  #noBtn{background:#cfcfcf;box-shadow:none;position:relative}
  #yesResult{margin-top:20px;font-size:1.1rem;color:var(--deep);display:none;line-height:2}
  #yesResult img{width:130px;display:block;margin:10px auto 0}

  footer{text-align:center;margin-top:44px;font-size:.85rem;color:#c98ba0;line-height:2}

  .reveal{opacity:0;transform:translateY(30px);transition:.8s ease}
  .reveal.on{opacity:1;transform:none}
</style>
</head>
<body>

<div id="cover">
  <div class="env" id="envelope">💌</div>
  <p>小雯宝宝，这里有一封信哦</p>
  <span class="tip">（点一下小信封打开）</span>
</div>

<div class="heart-bg" id="heartBg"></div>

<div class="wrap">

  <header class="hero">
    <img class="main" src="chiikawa1.png" alt="chiikawa">
    <h1>小雯宝宝<span class="dot">♡</span></h1>
    <p class="sub">这是专属于你的小小网页</p>
    <div class="arrow">▼</div>
  </header>

  <div class="card reveal">
    <img class="stamp" src="momonga.png" alt="">
    <h2><img src="hachiware.png" alt="">想对你说</h2>
    <p>
      亲爱的小雯宝宝：<br>
      遇见你之后，好像每天都变得亮晶晶的。<br>
      你笑起来的时候，比 Chiikawa 还可爱一万倍（真的，我认真比过了）。<br>
      谢谢你出现在我的生活里呀。
    </p>
  </div>

  <div class="card reveal">
    <h2><img src="usagi.png" alt="">在一起的每一天</h2>
    <p style="text-align:center;color:#b06a82;font-size:.92rem">从遇见你开始，已经过去了——</p>
    <div class="counter">
      <div class="b"><div class="n" id="dd">0</div><div class="l">天</div></div>
      <div class="b"><div class="n" id="hh">0</div><div class="l">小时</div></div>
      <div class="b"><div class="n" id="mm">0</div><div class="l">分钟</div></div>
      <div class="b"><div class="n" id="ss">0</div><div class="l">秒</div></div>
    </div>
    <p style="text-align:center;margin-top:14px;font-size:.9rem;color:#c98ba0">每一秒都很喜欢你</p>
  </div>

  <div class="card reveal reason-box">
    <h2 style="justify-content:center"><img src="cutiepie.png" alt="">今日份喜欢你的理由</h2>
    <div id="reason">点下面的按钮抽一条 ↓</div>
    <button class="btn" id="reasonBtn">抽一条 ♡</button>
  </div>

  <div class="strip reveal">
    <img src="chiikawa1.png" alt="" title="吱！">
    <img src="hachiware.png" alt="" title="咔嚓！">
    <img src="usagi.png" alt="" title="呜拉！">
    <img src="momonga.png" alt="" title="看我看我！">
    <img src="cutiepie.png" alt="" title="嘿嘿">
  </div>

  <div class="card reveal q-box">
    <h2 style="justify-content:center">最后一个问题</h2>
    <p style="font-size:1.15rem">小雯宝宝，你喜欢我吗？</p>
    <div class="q-btns">
      <button class="btn" id="yesBtn">喜欢 ♡</button>
      <button class="btn" id="noBtn">不喜欢</button>
    </div>
    <div id="yesResult">
      我就知道！嘿嘿嘿～<br>
      那说好了，要一直一直在一起哦
      <img src="marshmallow.png" alt="">
    </div>
  </div>

  <footer>
    ♡ 为小雯宝宝特别制作 ♡<br>
    made with 100% 的喜欢
  </footer>
</div>

<script>
// envelope
const cover = document.getElementById('cover');
document.getElementById('envelope').addEventListener('click', () => {
  cover.classList.add('open');
  burst(innerWidth/2, innerHeight/2, 18);
});

// falling hearts
const bg = document.getElementById('heartBg');
const emo = ['💗','💕','🌸','✨','💖','🎀'];
for (let i=0;i<24;i++){
  const s = document.createElement('span');
  s.textContent = emo[Math.floor(Math.random()*emo.length)];
  s.style.left = Math.random()*100+'vw';
  s.style.fontSize = (12+Math.random()*18)+'px';
  s.style.animationDuration = (6+Math.random()*8)+'s';
  s.style.animationDelay = (-Math.random()*10)+'s';
  bg.appendChild(s);
}

// click burst hearts
function burst(x,y,n=8){
  for(let i=0;i<n;i++){
    const h=document.createElement('span');
    h.textContent='💗';
    h.style.cssText=`position:fixed;left:${x}px;top:${y}px;z-index:99;pointer-events:none;font-size:${14+Math.random()*16}px;transition:all 1.2s ease-out;`;
    document.body.appendChild(h);
    requestAnimationFrame(()=> {
      h.style.transform=`translate(${(Math.random()-0.5)*260}px,${(Math.random()-0.8)*260}px) rotate(${(Math.random()-0.5)*180}deg)`;
      h.style.opacity='0';
    });
    setTimeout(()=>h.remove(),1300);
  }
}
document.addEventListener('click', e=>burst(e.clientX,e.clientY,5));

// counter — 在一起的开始日期（可改）
const start = new Date('2025-01-01T00:00:00');
setInterval(()=>{
  let d = Math.max(0, Date.now()-start);
  document.getElementById('dd').textContent = Math.floor(d/86400000);
  document.getElementById('hh').textContent = Math.floor(d/3600000)%24;
  document.getElementById('mm').textContent = Math.floor(d/60000)%60;
  document.getElementById('ss').textContent = Math.floor(d/1000)%60;
},1000);

// reasons
const reasons = [
  '因为你笑起来的时候，眼睛弯弯的，超好看',
  '因为你生气的样子也很可爱（虽然不敢当面说）',
  '因为跟你在一起的时候，时间过得特别快',
  '因为你是全世界最好的小雯宝宝，没有之一',
  '因为你偶尔的小迷糊，可爱到犯规',
  '因为想到你，嘴角就会不自觉地上扬',
  '因为你认真做事的样子在发光',
  '因为抱着你的时候，感觉全世界都安静了',
  '因为你是我见过最最最可爱的宝宝',
  '不需要理由，喜欢你就是喜欢你呀'
];
let last=-1;
document.getElementById('reasonBtn').addEventListener('click',()=>{
  let i;
  do{ i=Math.floor(Math.random()*reasons.length);}while(i===last);
  last=i;
  const el=document.getElementById('reason');
  el.style.opacity=0;
  setTimeout(()=>{el.textContent='「 '+reasons[i]+' 」';el.style.transition='opacity .4s';el.style.opacity=1;},250);
});

// runaway no button
const noBtn=document.getElementById('noBtn');
function flee(){
  noBtn.style.position='fixed';
  noBtn.style.left=Math.random()*(innerWidth-120)+'px';
  noBtn.style.top=Math.random()*(innerHeight-60)+'px';
  noBtn.style.zIndex=98;
}
noBtn.addEventListener('mouseover',flee);
noBtn.addEventListener('touchstart',e=>{e.preventDefault();flee();},{passive:false});
noBtn.addEventListener('click',flee);

document.getElementById('yesBtn').addEventListener('click',e=>{
  document.getElementById('yesResult').style.display='block';
  noBtn.style.display='none';
  burst(e.clientX,e.clientY,24);
});

// reveal on scroll
const io=new IntersectionObserver(es=>es.forEach(x=>{if(x.isIntersecting){x.target.classList.add('on');io.unobserve(x.target);}}),{threshold:.15});
document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
</script>
</body>
</html>
