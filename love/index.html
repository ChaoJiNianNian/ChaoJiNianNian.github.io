<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>给小雯宝宝 ♡</title>
<style>
  :root{
    --pink:#ffb6c9;
    --pink2:#ff8fab;
    --deep:#e5537f;
    --text:#7a4a5a;
    --shadow:0 8px 24px rgba(229,83,127,.18);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:"Yuanti SC","YouYuan","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,#ffe3ec 0%,#fff0f5 45%,#ffeaf2 100%);
    color:var(--text);
    overflow-x:hidden;
    min-height:100vh;
  }
  .heart-bg{position:fixed;inset:0;pointer-events:none;z-index:0}
  .heart-bg span{position:absolute;top:-6vh;animation:fall linear infinite;opacity:.7}
  @keyframes fall{to{transform:translateY(110vh) rotate(360deg)}}

  /* floating chiikawa decorations */
  .float-chii{position:fixed;z-index:0;pointer-events:none;opacity:.9}
  .float-chii img{width:100%;height:100%;object-fit:contain}
  .fc1{width:74px;left:4vw;top:18vh;animation:drift 7s ease-in-out infinite}
  .fc2{width:64px;right:5vw;top:30vh;animation:drift 8s 1s ease-in-out infinite}
  .fc3{width:70px;left:6vw;bottom:16vh;animation:drift 9s 2s ease-in-out infinite}
  .fc4{width:60px;right:7vw;bottom:10vh;animation:drift 7.5s .5s ease-in-out infinite}
  @keyframes drift{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-22px) rotate(5deg)}}
  @media(max-width:700px){.fc1,.fc2{width:52px}.fc3,.fc4{width:46px}}

  /* envelope overlay */
  #cover{
    position:fixed;inset:0;z-index:100;
    background:linear-gradient(160deg,#ffd6e3,#ffeef4);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;
    transition:opacity .8s,visibility .8s;
  }
  #cover.open{opacity:0;visibility:hidden}
  #cover img{width:150px;animation:wobble 1.8s ease-in-out infinite}
  #cover .env{
    font-size:5.2rem;cursor:pointer;
    animation:wobble 1.6s ease-in-out infinite;
    filter:drop-shadow(0 10px 18px rgba(229,83,127,.3));
    user-select:none;
  }
  @keyframes wobble{0%,100%{transform:rotate(-4deg) scale(1)}50%{transform:rotate(4deg) scale(1.08)}}
  #cover p{font-size:1.15rem;color:var(--deep);letter-spacing:.15em}
  #cover .tip{font-size:.85rem;color:#c98ba0}

  /* music button */
  #musicBtn{
    position:fixed;top:16px;right:16px;z-index:90;
    width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;
    background:#fff;box-shadow:var(--shadow);font-size:1.5rem;
  }
  #musicBtn.playing{animation:spin 4s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  .wrap{position:relative;z-index:1;max-width:600px;margin:0 auto;padding:0 20px 40px}

  /* hero */
  .hero{min-height:96vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
  .hero img.main{width:min(230px,55vw);animation:bounce 2.4s ease-in-out infinite;filter:drop-shadow(0 12px 20px rgba(229,83,127,.25))}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
  .hero h1{
    font-size:clamp(2.4rem,10vw,3.6rem);margin-top:16px;color:var(--deep);
    text-shadow:3px 3px 0 #ffd6e3;
  }
  .hero h1 .dot{color:var(--pink2)}
  .hero .sub{margin-top:10px;font-size:1.05rem;color:#b06a82}
  .hero .trio{width:min(420px,88vw);margin-top:30px;border-radius:20px;box-shadow:var(--shadow)}
  .hero .arrow{margin-top:34px;font-size:1.4rem;color:var(--pink2);animation:bounce 1.6s infinite}

  .card{
    background:#fff;border-radius:24px;box-shadow:var(--shadow);
    padding:30px 26px;margin:30px 0;position:relative;
    border:3px dashed #ffd6e3;
  }
  .card h2{color:var(--deep);font-size:1.3rem;margin-bottom:16px;display:flex;align-items:center;justify-content:center;gap:10px}
  .card h2 img{width:46px;height:46px;object-fit:contain}
  .card p{line-height:2.1;font-size:1rem}
  .stamp{position:absolute;width:80px;top:-30px;right:-8px;transform:rotate(12deg);filter:drop-shadow(0 6px 10px rgba(0,0,0,.12))}
  .stamp.l{left:-10px;right:auto;transform:rotate(-12deg)}

  /* reasons */
  .reason-box{text-align:center}
  #reason{
    min-height:70px;display:flex;align-items:center;justify-content:center;
    font-size:1.08rem;color:var(--deep);padding:10px;line-height:1.9;
  }
  .btn{
    display:inline-block;border:none;cursor:pointer;
    background:linear-gradient(135deg,var(--pink2),var(--deep));color:#fff;
    font-size:1.02rem;padding:13px 34px;border-radius:999px;
    box-shadow:0 6px 16px rgba(229,83,127,.35);
    transition:transform .15s;font-family:inherit;
  }
  .btn:active{transform:scale(.93)}

  /* question */
  .q-box{text-align:center;padding-bottom:14px}
  .q-btns{display:flex;justify-content:center;gap:22px;margin-top:22px;position:relative;min-height:56px}
  #noBtn{background:#cfcfcf;box-shadow:none;position:relative}
  #yesResult{margin-top:20px;font-size:1.1rem;color:var(--deep);display:none;line-height:2}
  #yesResult img{width:140px;display:block;margin:12px auto 0}

  footer{text-align:center;margin-top:36px;font-size:.85rem;color:#c98ba0;line-height:2}
  footer img{width:60px;display:block;margin:0 auto 6px}

  .reveal{opacity:0;transform:translateY(30px);transition:.8s ease}
  .reveal.on{opacity:1;transform:none}
</style>
</head>
<body>

<div id="cover">
  <img src="chiikawa1.png" alt="">
  <div class="env" id="envelope">💌</div>
  <p>小雯宝宝，这里有一封信哦</p>
  <span class="tip">（点一下小信封打开，有音乐哦）</span>
</div>

<button id="musicBtn" title="播放/暂停音乐">🎵</button>
<audio id="bgm" src="bgm.mp3" loop preload="auto"></audio>

<div class="heart-bg" id="heartBg"></div>

<div class="float-chii fc1"><img src="usagi.png" alt=""></div>
<div class="float-chii fc2"><img src="momonga.png" alt=""></div>
<div class="float-chii fc3"><img src="rakko.png" alt=""></div>
<div class="float-chii fc4"><img src="kuri.png" alt=""></div>

<div class="wrap">

  <header class="hero">
    <img class="main" src="chiikawa1.png" alt="chiikawa">
    <h1>小雯宝宝<span class="dot">♡</span></h1>
    <p class="sub">全世界最可爱的宝宝，就是你啦</p>
    <img class="trio" src="trio.png" alt="magical chiikawa">
    <div class="arrow">▼</div>
  </header>

  <div class="card reveal">
    <img class="stamp" src="momonga.png" alt="">
    <h2><img src="hachiware.png" alt="">想对你说的话</h2>
    <p style="text-align:center">
      亲爱的小雯宝宝：<br>
      遇见你之后，每天都变得亮晶晶的。<br>
      你笑起来的样子，比吉伊卡哇还可爱一万倍<br>
      （我认真比过了，真的）。<br>
      谢谢你出现在我的世界里呀 ♡
    </p>
  </div>

  <div class="card reveal reason-box">
    <img class="stamp l" src="usagi.png" alt="">
    <h2><img src="cutiepie.png" alt="">今日份喜欢你的理由</h2>
    <div id="reason">点下面的按钮抽一条 ↓</div>
    <button class="btn" id="reasonBtn">抽一条 ♡</button>
  </div>

  <div class="card reveal q-box">
    <h2><img src="usagi.png" alt="">最后一个问题</h2>
    <p style="font-size:1.15rem">小雯宝宝，你喜欢我吗？</p>
    <div class="q-btns">
      <button class="btn" id="yesBtn">喜欢 ♡</button>
      <button class="btn" id="noBtn">不喜欢</button>
    </div>
    <div id="yesResult">
      我就知道！嘿嘿嘿～<br>
      那说好了，要一直一直在一起哦
      <img src="marshmallow.png" alt="">
    </div>
  </div>

  <footer>
    <img src="chiikawa1.png" alt="">
    ♡ 为小雯宝宝特别制作 ♡<br>
    made with 100% 的喜欢
  </footer>
</div>

<script>
const bgm = document.getElementById('bgm');
const musicBtn = document.getElementById('musicBtn');
bgm.volume = 0.55;
function updateMusicBtn(){
  musicBtn.textContent = bgm.paused ? '🎵' : '🎶';
  musicBtn.classList.toggle('playing', !bgm.paused);
}
musicBtn.addEventListener('click', ()=>{ bgm.paused ? bgm.play() : bgm.pause(); setTimeout(updateMusicBtn,50); });

// envelope: open + start music (user gesture)
const cover = document.getElementById('cover');
document.getElementById('envelope').addEventListener('click', () => {
  cover.classList.add('open');
  bgm.play().finally(updateMusicBtn);
  burst(innerWidth/2, innerHeight/2, 18);
});

// falling hearts
const bg = document.getElementById('heartBg');
const emo = ['💗','💕','🌸','✨','💖','🎀'];
for (let i=0;i<22;i++){
  const s = document.createElement('span');
  s.textContent = emo[Math.floor(Math.random()*emo.length)];
  s.style.left = Math.random()*100+'vw';
  s.style.fontSize = (12+Math.random()*18)+'px';
  s.style.animationDuration = (6+Math.random()*8)+'s';
  s.style.animationDelay = (-Math.random()*10)+'s';
  bg.appendChild(s);
}

// click burst hearts
function burst(x,y,n=8){
  for(let i=0;i<n;i++){
    const h=document.createElement('span');
    h.textContent='💗';
    h.style.cssText=`position:fixed;left:${x}px;top:${y}px;z-index:99;pointer-events:none;font-size:${14+Math.random()*16}px;transition:all 1.2s ease-out;`;
    document.body.appendChild(h);
    requestAnimationFrame(()=> {
      h.style.transform=`translate(${(Math.random()-0.5)*260}px,${(Math.random()-0.8)*260}px) rotate(${(Math.random()-0.5)*180}deg)`;
      h.style.opacity='0';
    });
    setTimeout(()=>h.remove(),1300);
  }
}
document.addEventListener('click', e=>burst(e.clientX,e.clientY,5));

// reasons
const reasons = [
  '因为你笑起来的时候，眼睛弯弯的，超好看',
  '因为你生气的样子也很可爱（虽然不敢当面说）',
  '因为跟你在一起的时候，时间过得特别快',
  '因为你是全世界最好的小雯宝宝，没有之一',
  '因为你偶尔的小迷糊，可爱到犯规',
  '因为想到你，嘴角就会不自觉地上扬',
  '因为你认真做事的样子在发光',
  '因为抱着你的时候，感觉全世界都安静了',
  '因为你是我见过最最最可爱的宝宝',
  '不需要理由，喜欢你就是喜欢你呀'
];
let last=-1;
document.getElementById('reasonBtn').addEventListener('click',()=>{
  let i;
  do{ i=Math.floor(Math.random()*reasons.length);}while(i===last);
  last=i;
  const el=document.getElementById('reason');
  el.style.opacity=0;
  setTimeout(()=>{el.textContent='「 '+reasons[i]+' 」';el.style.transition='opacity .4s';el.style.opacity=1;},250);
});

// runaway no button
const noBtn=document.getElementById('noBtn');
function flee(){
  noBtn.style.position='fixed';
  noBtn.style.left=Math.random()*(innerWidth-120)+'px';
  noBtn.style.top=Math.random()*(innerHeight-60)+'px';
  noBtn.style.zIndex=98;
}
noBtn.addEventListener('mouseover',flee);
noBtn.addEventListener('touchstart',e=>{e.preventDefault();flee();},{passive:false});
noBtn.addEventListener('click',flee);

document.getElementById('yesBtn').addEventListener('click',e=>{
  document.getElementById('yesResult').style.display='block';
  noBtn.style.display='none';
  burst(e.clientX,e.clientY,24);
});

// reveal on scroll
const io=new IntersectionObserver(es=>es.forEach(x=>{if(x.isIntersecting){x.target.classList.add('on');io.unobserve(x.target);}}),{threshold:.15});
document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
</script>
</body>
</html>
